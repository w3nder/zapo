name: ci

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run lint
              run: npm run lint

    format:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run format check
              run: npm run format:check

    typecheck:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run typecheck
              run: npm run typecheck

    typecheck-packages:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build core
              run: npm run build

            - name: run package typecheck
              run: npm run typecheck:packages

    test-core:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build core
              run: npm run build

            - name: run core tests
              run: npm test

    test-media-utils:
        runs-on: ubuntu-latest
        needs: test-core

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install ffmpeg and ffprobe
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ffmpeg
                  ffmpeg -version
                  ffprobe -version

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/media-utils

            - name: run media-utils tests
              run: npm test -w packages/media-utils

    test-sqlite:
        runs-on: ubuntu-latest
        needs: test-core

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/store-sqlite

            - name: run sqlite tests
              run: npm test -w packages/store-sqlite

    test-mysql:
        runs-on: ubuntu-latest
        needs: test-core

        services:
            mysql:
                image: mysql:8
                env:
                    MYSQL_ROOT_PASSWORD: test
                    MYSQL_DATABASE: zapo_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping -h localhost -u root -ptest"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/store-mysql

            - name: run mysql tests
              run: npm test -w packages/store-mysql
              env:
                  ZAPO_TEST_MYSQL_HOST: localhost
                  ZAPO_TEST_MYSQL_PORT: '3306'
                  ZAPO_TEST_MYSQL_USER: root
                  ZAPO_TEST_MYSQL_PASSWORD: test
                  ZAPO_TEST_MYSQL_DATABASE: zapo_test

    test-postgres:
        runs-on: ubuntu-latest
        needs: test-core

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_PASSWORD: test
                    POSTGRES_DB: zapo_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/store-postgres

            - name: run postgres tests
              run: npm test -w packages/store-postgres
              env:
                  ZAPO_TEST_PG_HOST: localhost
                  ZAPO_TEST_PG_PORT: '5432'
                  ZAPO_TEST_PG_USER: postgres
                  ZAPO_TEST_PG_PASSWORD: test
                  ZAPO_TEST_PG_DATABASE: zapo_test

    test-redis:
        runs-on: ubuntu-latest
        needs: test-core

        services:
            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd="redis-cli ping"
                    --health-interval=3s
                    --health-retries=10

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/store-redis

            - name: run redis tests
              run: npm test -w packages/store-redis
              env:
                  ZAPO_TEST_REDIS_HOST: localhost
                  ZAPO_TEST_REDIS_PORT: '6379'

    test-mongo:
        runs-on: ubuntu-latest
        needs: test-core

        steps:
            - name: start mongo replica set
              run: |
                  docker run -d --name mongo -p 27017:27017 mongo:7 mongod --replSet rs0
                  until docker exec mongo mongosh --eval "rs.initiate()" --quiet 2>/dev/null; do
                    sleep 1
                  done

            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: build
              run: npm run build && npx turbo run build --filter=@zapo-js/store-mongo

            - name: run mongo tests
              run: npm test -w packages/store-mongo
              env:
                  ZAPO_TEST_MONGO_HOST: localhost
                  ZAPO_TEST_MONGO_PORT: '27017'
