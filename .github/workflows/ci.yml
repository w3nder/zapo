name: ci

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run lint
              run: npm run lint

    format:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run format check
              run: npm run format:check

    tests:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run tests
              run: npm test

    benchmarks_pr_comment:
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        needs:
            - tests
        permissions:
            contents: read
            issues: write
            pull-requests: write

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run benchmarks
              id: bench_pr
              env:
                  WA_BENCH_OUTPUT_MODE: compact
                  WA_BENCH_OUTPUT_FORMAT: human
                  WA_BENCH_JSON_DIR: bench-results/pr
                  WA_BENCH_JSON_PRETTY: 'true'
                  WA_BENCH_FAIL_ON_FAIL: 'false'
              run: |
                  set +e
                  npm run bench:all 2>&1 | tee bench-output-pr.txt
                  BENCH_EXIT_CODE=$?
                  echo "exit_code=${BENCH_EXIT_CODE}" >> "$GITHUB_OUTPUT"
                  exit 0

            - name: checkout base branch
              if: always()
              continue-on-error: true
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.base.sha }}
                  path: baseline

            - name: install base dependencies
              if: always()
              continue-on-error: true
              working-directory: baseline
              run: npm ci

            - name: run base benchmarks
              if: always()
              continue-on-error: true
              id: bench_base
              working-directory: baseline
              env:
                  WA_BENCH_OUTPUT_MODE: compact
                  WA_BENCH_OUTPUT_FORMAT: human
                  WA_BENCH_JSON_DIR: ../bench-results/base
                  WA_BENCH_JSON_PRETTY: 'true'
                  WA_BENCH_FAIL_ON_FAIL: 'false'
              run: |
                  set +e
                  npm run bench:all 2>&1 | tee ../bench-output-base.txt
                  BENCH_EXIT_CODE=$?
                  echo "exit_code=${BENCH_EXIT_CODE}" >> "$GITHUB_OUTPUT"
                  exit 0

            - name: assemble benchmark logs
              if: always()
              env:
                  BASE_REF: ${{ github.event.pull_request.base.ref }}
                  BASE_SHA: ${{ github.event.pull_request.base.sha }}
              run: |
                  {
                      echo "=== PR benchmark run ==="
                      if [ -f bench-output-pr.txt ]; then
                          cat bench-output-pr.txt
                      else
                          echo "pr benchmark log not found"
                      fi
                      echo ""
                      echo "=== base benchmark run (${BASE_REF} @ ${BASE_SHA}) ==="
                      if [ -f bench-output-base.txt ]; then
                          cat bench-output-base.txt
                      else
                          echo "base benchmark log not found"
                      fi
                  } > bench-output.txt

            - name: build benchmark comment
              if: always()
              env:
                  WA_BENCH_COMMENT_DIR: bench-results/pr
                  WA_BENCH_COMMENT_BASE_DIR: bench-results/base
                  WA_BENCH_COMMENT_OUTPUT: bench-comment.md
                  WA_BENCH_LOG_PATH: bench-output.txt
                  WA_BENCH_EXIT_CODE: ${{ steps.bench_pr.outputs.exit_code }}
                  WA_BENCH_BASE_EXIT_CODE: ${{ steps.bench_base.outputs.exit_code }}
              run: npm run bench:comment

            - name: upload benchmark artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-pr-report
                  path: |
                      bench-output-pr.txt
                      bench-output-base.txt
                      bench-output.txt
                      bench-comment.md
                      bench-results
                  if-no-files-found: ignore
                  retention-days: 7

            - name: publish benchmark comment
              if: always()
              uses: marocchino/sticky-pull-request-comment@v2
              with:
                  header: benchmark-report
                  path: bench-comment.md
