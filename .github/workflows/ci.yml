name: ci

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run lint
              run: npm run lint

    format:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run format check
              run: npm run format:check

    tests:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repository
              uses: actions/checkout@v4

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: install dependencies
              run: npm ci

            - name: run tests
              run: npm test
